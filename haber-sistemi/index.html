<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haber Sistemi — Yakında · emreak.art</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    .badge {
      display: inline-block;
      background: #00637d;
      color: white;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    h1 { font-size: 26px; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; }
    p  { font-size: 15px; color: #888; line-height: 1.6; max-width: 380px; }
    .back-link {
      margin-top: 32px;
      display: inline-block;
      font-size: 14px;
      font-weight: 600;
      color: #00637d;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .back-link:hover { border-color: #00637d; }
  </style>
</head>
<body>
  <div class="icon">📰</div>
  <span class="badge">Yakında</span>
  <h1>Haber Sistemi</h1>
  <p>Bu proje henüz hazır değil. Çok yakında burada yayına girecek.</p>
  <a href="../" class="back-link">← Ana sayfaya dön</a>
</body>
</html>
